{% load static %}

<div>
    <div class="profile-head">
        <div class="profile-picture">
            {% if user_avatar %}
                <img src="{{ user_avatar }}" alt="{{ user.username }}">
            {% else %}
                <img src="{% static 'icons/example-photo.png' %}" alt="{{ user.username }}">
            {% endif %}
        </div>
        <div class="profile-name">
            <h3>{{ user.first_name }} {{ user.last_name }}</h3>
            <p>@{{ user.username }}</p>
        </div>
    </div>

    <div class="profile-info">
        <div class="info-container">
            <h3>{{ profile_stats.posts_count }}</h3>
            <p>Дописи</p>
        </div>
        <div class="info-container">
            <h3>{{ profile_stats.readers_count }}</h3>
            <p>Читачі</p>
        </div>
        <div class="info-container">
            <h3>{{ profile_stats.friends_count }}</h3>
            <p>Друзі</p>
        </div>
    </div>
</div>
